<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Account - SpeakWell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- FORM PAGE -->
<div class="container" id="formPage">
    <h1>Delete Your SpeakWell Account</h1>
    <p class="subtitle">We’re sorry to see you go 😔</p>

    <form onsubmit="handleDelete(event)">
        <label>Full Name</label>
        <input type="text" id="name" required>

        <label>Email Address</label>
        <input type="email" id="email" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" required>

        <label>Reason (optional)</label>
        <textarea id="reason"></textarea>

        <button type="submit" class="delete-btn">Delete Account</button>
    </form>
</div>

<!-- SUCCESS PAGE -->
<div class="success-page" id="successPage">
    <h1>Your SpeakWell account deletion request has been received.</h1>
    <p>Our team will process it within <strong>3–5 working days.</strong></p>
</div>

<script>
function handleDelete(event) {
    event.preventDefault();

    // simple validation (optional extra)
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(name === "" || email === "") {
        alert("Please fill all required fields");
        return;
    }

    // Hide form and show success message
    document.getElementById("formPage").style.display = "none";
    document.getElementById("successPage").style.display = "flex";
}
</script>

</body>
</html>
